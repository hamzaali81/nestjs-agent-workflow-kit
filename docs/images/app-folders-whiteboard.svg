<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'SFMono-Regular', 'Consolas', 'Menlo', monospace">
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="500" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933" font-family="'Segoe UI', Arial, sans-serif">src/ layout</text>

  <g font-size="15" fill="#1f2933">
    <text x="80" y="92" font-weight="700">src/</text>

    <text x="120" y="124">├─ <tspan font-weight="700">common/</tspan>  <tspan fill="#7b8794">guards · interceptors · filters · pipes · decorators</tspan></text>
    <text x="120" y="152">├─ <tspan font-weight="700">config/</tspan>  <tspan fill="#7b8794">ConfigModule · env schema · namespaced config</tspan></text>

    <text x="120" y="180">├─ <tspan font-weight="700" fill="#E0234E">modules/</tspan>  <tspan fill="#7b8794">feature modules</tspan></text>
    <text x="160" y="208" fill="#E0234E">│   └─ <tspan font-weight="700">users/</tspan></text>
    <text x="220" y="236">│       ├─ users.module.ts</text>
    <text x="220" y="260">│       ├─ users.controller.ts</text>
    <text x="220" y="284">│       ├─ users.service.ts</text>
    <text x="220" y="308">│       ├─ users.repository.ts</text>
    <text x="220" y="332">│       ├─ dto/  <tspan fill="#7b8794">create-user.dto.ts · update-user.dto.ts</tspan></text>
    <text x="220" y="356">│       └─ *.spec.ts  <tspan fill="#7b8794">unit + e2e</tspan></text>

    <text x="120" y="388">├─ <tspan font-weight="700">prisma/</tspan>  <tspan fill="#7b8794">PrismaModule · PrismaService · schema.prisma</tspan></text>
    <text x="120" y="416">├─ app.module.ts  <tspan fill="#7b8794">composition root</tspan></text>
    <text x="120" y="444">└─ main.ts  <tspan fill="#7b8794">bootstrap: pipes · filters · versioning · Swagger</tspan></text>
  </g>

  <text x="500" y="490" text-anchor="middle" font-size="12" fill="#7b8794" font-family="'Segoe UI', Arial, sans-serif">Colocate controller, service, DTOs, and tests inside the feature module that owns them.</text>
</svg>
